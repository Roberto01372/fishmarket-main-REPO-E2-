name: Backend CI (Order Service)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

defaults:
  run:
    working-directory: mock-api

jobs:
  test-and-verify:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar Dependencias
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Validar Sintaxis (Linter)
        run: |
          if [ -f server.js ]; then
            node --check server.js
          else
            echo "No se encontró server.js dentro de mock-api"
            exit 1
          fi